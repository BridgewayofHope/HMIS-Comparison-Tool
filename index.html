<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMIS Comparison Tool (Auto Entry/Exit)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.container{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.15);}
button{padding:10px 15px;margin:5px;cursor:pointer;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
th,td{border:1px solid #ccc;padding:6px;}
th{background:#eee;}
.results{max-height:250px;overflow:auto;margin-bottom:20px;}
.summary{background:#eef7ff;padding:10px;margin:10px 0;border-radius:6px;}
</style>
</head>

<body>
<div class="container">
<h2>HMIS Comparison Tool (Auto Entry/Exit Detection)</h2>

<input type="file" id="file1"><br><br>
<input type="file" id="file2"><br><br>

<button onclick="run()">Compare</button>
<button onclick="download()">Download Excel</button>

<div id="summary" class="summary"></div>

<h3>Both Files</h3>
<div id="both" class="results"></div>

<h3>Entry</h3>
<div id="entry" class="results"></div>

<h3>Exit</h3>
<div id="exit" class="results"></div>

<h3>Zero HMIS</h3>
<div id="zero" class="results"></div>

</div>

<script>

let both=[], entry=[], exit=[], zero=[];

function norm(v){return String(v||"").trim();}

function excelDate(n){
  const d = new Date((n - 25569)*86400*1000);
  return isNaN(d)?null:d;
}

function parseDate(v){
  if(!v) return null;
  if(typeof v==="number") return excelDate(v);
  const d=new Date(v);
  return isNaN(d)?null:d;
}

function findMinDate(data, col){
  let min=null;
  data.forEach(r=>{
    const d=parseDate(r[col]);
    if(d && (!min || d<min)) min=d;
  });
  return min;
}

function detectHMIS(data){
  const keys=Object.keys(data[0]||{});
  return keys.find(k=>k.toLowerCase().includes("hmis")) || keys[0];
}

function detectDate(data){
  const keys=Object.keys(data[0]||{});
  return keys.find(k=>k.toLowerCase().includes("date")) || "";
}

function render(id,arr){
  let html="<table><tr><th>HMIS</th><th>Name</th><th>Date</th></tr>";
  arr.forEach(r=>{
    html+=`<tr><td>${r.HMIS}</td><td>${r.Name||""}</td><td>${r.Date||""}</td></tr>`;
  });
  html+="</table>";
  document.getElementById(id).innerHTML=arr.length?html:"None";
}

function read(file){
  return new Promise(res=>{
    const fr=new FileReader();
    fr.onload=e=>{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      res(XLSX.utils.sheet_to_json(ws,{defval:""}));
    };
    fr.readAsArrayBuffer(file);
  });
}

async function run(){

const f1=document.getElementById("file1").files[0];
const f2=document.getElementById("file2").files[0];
if(!f1||!f2) return alert("Select both files");

const d1=await read(f1);
const d2=await read(f2);

const h1=detectHMIS(d1);
const h2=detectHMIS(d2);
const dt1=detectDate(d1);
const dt2=detectDate(d2);

const min1=findMinDate(d1,dt1);
const min2=findMinDate(d2,dt2);

let early=d1, late=d2, earlyMap={}, lateMap={};
let earlyDate=min1, lateDate=min2;

if(min2<min1){
  early=d2; late=d1;
  earlyDate=min2; lateDate=min1;
}

early.forEach(r=>{
  const h=norm(r[h1]||r[h2]);
  if(!h) return;
  earlyMap[h]=r;
});

late.forEach(r=>{
  const h=norm(r[h1]||r[h2]);
  if(!h) return;
  lateMap[h]=r;
});

both=[]; entry=[]; exit=[]; zero=[];

Object.keys({...earlyMap,...lateMap}).forEach(h=>{
  const inE=earlyMap[h];
  const inL=lateMap[h];
  const rec=inE||inL;

  if(h==="0") zero.push({HMIS:h,Name:rec.Name,Date:""});

  if(inE && inL) both.push({HMIS:h,Name:rec.Name,Date:""});

  if(inE && !inL) exit.push({HMIS:h,Name:rec.Name,Date:earlyDate?earlyDate.toISOString().split("T")[0]:""});

  if(!inE && inL) entry.push({HMIS:h,Name:rec.Name,Date:lateDate?lateDate.toISOString().split("T")[0]:""});
});

render("both",both);
render("entry",entry);
render("exit",exit);
render("zero",zero);

document.getElementById("summary").innerHTML=
`Early File Date: ${earlyDate}<br>Late File Date: ${lateDate}<br>
Both: ${both.length} | Entry: ${entry.length} | Exit: ${exit.length} | Zero: ${zero.length}`;

}

function download(){

const wb=XLSX.utils.book_new();

function add(name,data){
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name);
}

add("Present In Both",both);
add("ENTRY - "+new Date().toISOString().split("T")[0],entry);
add("EXIT - "+new Date().toISOString().split("T")[0],exit);
add("HMIS Zero",zero);

XLSX.writeFile(wb,"HMIS_Report.xlsx");
}

</script>

</body>
</html>
