<script>

let both=[], entry=[], exit=[], zero=[], duplicates=[];

function norm(v){return String(v||"").trim();}

function detectColumn(data, keyword){
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes(keyword)) || "";
}

function mostCommonDate(arr){
  const freq={};
  arr.forEach(r=>{
    const d=r.Date;
    if(!d) return;
    freq[d]=(freq[d]||0)+1;
  });
  return Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0] || "";
}

function read(file){
  return new Promise(res=>{
    const fr=new FileReader();
    fr.onload=e=>{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      res(XLSX.utils.sheet_to_json(ws,{defval:""}));
    };
    fr.readAsArrayBuffer(file);
  });
}

async function run(){

const f1=document.getElementById("file1").files[0];
const f2=document.getElementById("file2").files[0];
if(!f1||!f2) return alert("Select both files");

const d1=await read(f1);
const d2=await read(f2);

// detect columns
const h1 = detectColumn(d1, "hmis");
const h2 = detectColumn(d2, "hmis");

const n1 = detectColumn(d1, "name");
const n2 = detectColumn(d2, "name");

const dt1 = detectColumn(d1, "date");
const dt2 = detectColumn(d2, "date");

// build maps + detect duplicates
const earlyCounts={}, lateCounts={};
const earlyMap={}, lateMap={};

d1.forEach(r=>{
  const h=norm(r[h1]);
  if(!h) return;

  earlyCounts[h]=(earlyCounts[h]||0)+1;

  if(!earlyMap[h]){
    earlyMap[h]={
      HMIS:h,
      Name:norm(r[n1]),
      Date:r[dt1]||""
    };
  }

  if(earlyCounts[h]>1){
    duplicates.push({
      HMIS:h,
      Name:norm(r[n1]),
      Date:r[dt1]||"",
      Source:"Earlier File"
    });
  }
});

d2.forEach(r=>{
  const h=norm(r[h2]);
  if(!h) return;

  lateCounts[h]=(lateCounts[h]||0)+1;

  if(!lateMap[h]){
    lateMap[h]={
      HMIS:h,
      Name:norm(r[n2]),
      Date:r[dt2]||""
    };
  }

  if(lateCounts[h]>1){
    duplicates.push({
      HMIS:h,
      Name:norm(r[n2]),
      Date:r[dt2]||"",
      Source:"Later File"
    });
  }
});

// reset outputs
both=[]; entry=[]; exit=[];

// classification
Object.keys({...earlyMap,...lateMap}).forEach(h=>{
  const inE=earlyMap[h];
  const inL=lateMap[h];

  if(inE && inL){
    both.push({
      HMIS:h,
      Name:inL.Name || inE.Name,
      Date: inE.Date || inL.Date
    });
  }

  if(inE && !inL){
    exit.push(inE);
  }

  if(!inE && inL){
    entry.push(inL);
  }
});

// compute most common dates
const exitDate = mostCommonDate(exit);
const entryDate = mostCommonDate(entry);

// store for export
window.exportData = {
  both,
  exit,
  entry,
  duplicates,
  exitDate,
  entryDate
};

alert("Comparison complete. Ready to download.");

}

function download(){

const wb=XLSX.utils.book_new();

function add(name,data){
  if(data.length){
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name);
  }
}

// add sheets
add("Present In Both", window.exportData.both);

add(
  "EXIT - " + (window.exportData.exitDate || "NoDate"),
  window.exportData.exit
);

add(
  "ENTRY - " + (window.exportData.entryDate || "NoDate"),
  window.exportData.entry
);

add("Duplicates", window.exportData.duplicates);

// write file
XLSX.writeFile(wb,"HMIS_Report.xlsx");
}

</script>
