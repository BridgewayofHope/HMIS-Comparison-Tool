<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMIS Excel Comparison Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
    margin-top:0;
}

button{
    padding:10px 20px;
    margin:10px 5px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:left;
}

th{
    background:#eee;
}

.results{
    max-height:300px;
    overflow-y:auto;
    margin-bottom:30px;
}

.summary{
    background:#eef7ff;
    padding:12px;
    border-radius:6px;
    margin:15px 0;
}
</style>
</head>
<body>

<div class="container">

<h1>HMIS Excel Comparison Tool</h1>

<p>Select two Excel files for HMIS comparison.</p>

<label>Excel File 1</label><br>
<input type="file" id="file1" accept=".xlsx,.xls"><br><br>

<label>Excel File 2</label><br>
<input type="file" id="file2" accept=".xlsx,.xls"><br><br>

<button onclick="compareFiles()">Compare Files</button>
<button onclick="downloadResults()">Export Results</button>

<div id="summary" class="summary"></div>

<h2>HMIS Numbers Present In Both Files</h2>
<div id="bothResults" class="results"></div>

<h2>HMIS Numbers Appearing Only Once</h2>
<div id="onceResults" class="results"></div>

<h2>HMIS Numbers Equal To 0</h2>
<div id="zeroResults" class="results"></div>

</div>

<script>

let bothRecords = [];
let onceRecords = [];
let zeroRecords = [];

let file1Count = 0;
let file2Count = 0;

function normalizeHMIS(value){

    if(value === null || value === undefined){
        return "";
    }

    return String(value).trim();
}

function excelDateToJSDate(serial){

    const utcDays = Math.floor(serial - 25569);
    const utcValue = utcDays * 86400;

    const dateInfo = new Date(utcValue * 1000);

    return dateInfo;
}

function normalizeDate(value){

    if(value === null || value === undefined || value === ""){
        return "";
    }

    if(typeof value === "number"){

        const d = excelDateToJSDate(value);

        if(!isNaN(d)){
            return d.toISOString().split("T")[0];
        }
    }

    const parsed = new Date(value);

    if(!isNaN(parsed)){
        return parsed.toISOString().split("T")[0];
    }

    return "";
}

function readExcel(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = function(e){

            const data =
                new Uint8Array(e.target.result);

            const workbook =
                XLSX.read(data,{
                    type:"array"
                });

            const firstSheet =
                workbook.SheetNames[0];

            const worksheet =
                workbook.Sheets[firstSheet];

            const json =
                XLSX.utils.sheet_to_json(
                    worksheet,
                    {defval:""}
                );

            resolve(json);
        };

        reader.onerror = reject;

        reader.readAsArrayBuffer(file);
    });
}

function findColumn(headers, keywords){

    const normalized =
        headers.map(h =>
            String(h).toLowerCase().trim()
        );

    for(const keyword of keywords){

        const exact =
            normalized.find(h =>
                h === keyword
            );

        if(exact){

            return headers[
                normalized.indexOf(exact)
            ];
        }
    }

    for(const keyword of keywords){

        const partial =
            normalized.find(h =>
                h.includes(keyword)
            );

        if(partial){

            return headers[
                normalized.indexOf(partial)
            ];
        }
    }

    return null;
}

function detectColumns(data){

    const headers =
        Object.keys(data[0] || {});

    let hmisColumn =
        findColumn(headers,[
            "hmis",
            "hmis id",
            "hmis number",
            "client id",
            "participant id",
            "unique id"
        ]);

    let nameColumn =
        findColumn(headers,[
            "name",
            "client name",
            "participant name",
            "resident",
            "full name"
        ]);

    let dateColumn =
        findColumn(headers,[
            "date",
            "entry date",
            "exit date",
            "service date",
            "assessment date",
            "created date"
        ]);

    if(!hmisColumn){

        let highest = 0;

        headers.forEach(header=>{

            let score = 0;

            data.slice(0,100).forEach(row=>{

                const value =
                    String(row[header] || "");

                if(/^\d+$/.test(value.trim())){
                    score++;
                }

            });

            if(score > highest){

                highest = score;
                hmisColumn = header;

            }

        });

    }

    if(!nameColumn){

        headers.forEach(header=>{

            let score = 0;

            data.slice(0,50).forEach(row=>{

                const value =
                    String(row[header] || "");

                if(/[A-Za-z]/.test(value)
                    && value.includes(" ")){
                    score++;
                }

            });

            if(score > 20){
                nameColumn = header;
            }

        });

    }

    if(!dateColumn){

        headers.forEach(header=>{

            let score = 0;

            data.slice(0,50).forEach(row=>{

                const value =
                    row[header];

                if(normalizeDate(value)){
                    score++;
                }

            });

            if(score > 20){
                dateColumn = header;
            }

        });

    }

    return {
        hmisColumn,
        nameColumn,
        dateColumn
    };
}

function renderTable(target,data){

    if(data.length === 0){

        document.getElementById(target).innerHTML =
            "<p>No records found.</p>";

        return;
    }

    let html =
    `<table>
        <tr>
            <th>HMIS</th>
            <th>Name</th>
            <th>Date</th>
        </tr>`;

    data.forEach(row=>{

        html += `
        <tr>
            <td>${row.HMIS}</td>
            <td>${row.Name || ""}</td>
            <td>${row.Date || ""}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById(target).innerHTML =
        html;
}

async function compareFiles(){

    const file1 =
        document.getElementById("file1")
        .files[0];

    const file2 =
        document.getElementById("file2")
        .files[0];

    if(!file1 || !file2){

        alert(
            "Please select both Excel files."
        );

        return;
    }

    const data1 =
        await readExcel(file1);

    const data2 =
        await readExcel(file2);

    file1Count = data1.length;
    file2Count = data2.length;

    const cols1 =
        detectColumns(data1);

    const cols2 =
        detectColumns(data2);

    if(!cols1.hmisColumn ||
       !cols2.hmisColumn){

        alert(
            "Unable to detect HMIS column."
        );

        return;
    }

    const map1 = new Map();
    const map2 = new Map();

    data1.forEach(row=>{

        const hmis =
            normalizeHMIS(
                row[cols1.hmisColumn]
            );

        if(!hmis){
            return;
        }

        map1.set(hmis,{
            HMIS:hmis,
            Name:cols1.nameColumn
                ? row[cols1.nameColumn]
                : "",
            Date:cols1.dateColumn
                ? normalizeDate(
                    row[cols1.dateColumn]
                  )
                : ""
        });

    });

    data2.forEach(row=>{

        const hmis =
            normalizeHMIS(
                row[cols2.hmisColumn]
            );

        if(!hmis){
            return;
        }

        map2.set(hmis,{
            HMIS:hmis,
            Name:cols2.nameColumn
                ? row[cols2.nameColumn]
                : "",
            Date:cols2.dateColumn
                ? normalizeDate(
                    row[cols2.dateColumn]
                  )
                : ""
        });

    });

    bothRecords = [];
    onceRecords = [];
    zeroRecords = [];

    const allHMIS =
        new Set([
            ...map1.keys(),
            ...map2.keys()
        ]);

    allHMIS.forEach(hmis=>{

        const in1 =
            map1.has(hmis);

        const in2 =
            map2.has(hmis);

        const record =
            map1.get(hmis) ||
            map2.get(hmis);

        if(hmis === "0"){
            zeroRecords.push(record);
        }

        if(in1 && in2){
            bothRecords.push(record);
        }

        if(in1 !== in2){
            onceRecords.push(record);
        }

    });

    renderTable(
        "bothResults",
        bothRecords
    );

    renderTable(
        "onceResults",
        onceRecords
    );

    renderTable(
        "zeroResults",
        zeroRecords
    );

    document.getElementById("summary").innerHTML =
    `
    <strong>Comparison Summary</strong><br><br>

    File 1 Records: ${file1Count}<br>
    File 2 Records: ${file2Count}<br><br>

    Present In Both:
    ${bothRecords.length}<br>

    Only Once:
    ${onceRecords.length}<br>

    HMIS = 0:
    ${zeroRecords.length}<br><br>

    File 1 HMIS Column:
    ${cols1.hmisColumn}<br>

    File 2 HMIS Column:
    ${cols2.hmisColumn}
    `;
}

function downloadResults(){

    const wb = XLSX.utils.book_new();

    // Present In Both
    XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.json_to_sheet(
            bothRecords
        ),
        "Present In Both"
    );

    // HMIS Zero
    XLSX.utils.book_append_sheet(
        wb,
        XLSX.utils.json_to_sheet(
            zeroRecords
        ),
        "HMIS Zero"
    );

    // Group "Only Once" records by date
    const groupedDates = {};

    onceRecords.forEach(record => {

        let dateKey = "Unknown Date";

        if(record.Date){

            const dateObj =
                new Date(record.Date);

            if(!isNaN(dateObj)){

                dateKey =
                    dateObj
                    .toISOString()
                    .split("T")[0];

            }

        }

        if(!groupedDates[dateKey]){
            groupedDates[dateKey] = [];
        }

        groupedDates[dateKey].push(record);

    });

    // Create one tab per date
    Object.keys(groupedDates)
        .sort()
        .forEach(date => {

            let sheetName =
                `Only Once - ${date}`;

            // Excel limit = 31 chars
            sheetName =
                sheetName.substring(0,31);

            XLSX.utils.book_append_sheet(
                wb,
                XLSX.utils.json_to_sheet(
                    groupedDates[date]
                ),
                sheetName
            );

        });

    XLSX.writeFile(
        wb,
        "HMIS_Comparison_Results.xlsx"
    );

}
